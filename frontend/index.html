<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="tailwindcss.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  </head>
  <body class="bg-gray-950 text-violet-100">

        <div class="relative">
          <h2 class="text-center">Kategorie</h2>
          <button class="absolute top-0 right-2 hover:bg-gray-800 text-center aspect-square w-7 rounded-full border-gray-800 transition-all duration-75 border-1" onclick="createNewCategoryWindow()"> 
            <div class="absolute top-0 left-0 right-0 bottom-0 text-center">+</div>
          </button>
        </div>
        <br>
        <div class="kategorie relative h-max flex flex-col overflow-y-auto overflow-x-hidden [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:bg-gray-800 [&::-webkit-scrollbar-thumb]:rounded-full">
      
        </div>
      </div>

      <div class="absolute bottom-2 overflow-y-auto left-54 top-2 right-2 rounded-4xl bg-gray-950 border-gray-800 border-1 p-4 [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:bg-gray-800 [&::-webkit-scrollbar-thumb]:rounded-full ">
        <div class="files flex-row flex gap-3 flex-wrap">
            <!-- tutaj pliki -->
        </div>
      </div>

    </div>
