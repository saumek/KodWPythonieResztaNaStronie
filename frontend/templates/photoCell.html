<button class="group relative min-w-32 w-32 aspect-square overflow-hidden rounded-2xl border-gray-800 border-1 hover:scale-105 transition-all duration-100" onclick="openFile('${id}')">
    <img src="photos/${name}" alt="${desc}" fileId=${id} class="absolute top-0 min-h-[100%] min-w-[100%] object-cover">
    <div class="absolute bottom-0 right-0 left-0 bg-[#00000045] group-hover:opacity-100 opacity-0 transition-all duration-150">${desc}</div>
</button>
